version: '3.8'
services:
  auditor:
    build: .
    container_name: infra_auditor_service
    volumes:
      - ./telemetry:/app/telemetry
    restart: on-failure
  
  db_storage:
    image: postgres:15-alpine
    container_name: infra_db
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_pass_123}
      POSTGRES_DB: network_metrics